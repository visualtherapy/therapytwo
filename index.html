<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen Push-Up Therapy</title>
    <!-- Google Fonts: Orbitron -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00d4ff;
            --bg-color: #020205;
            --container-bg: rgba(15, 15, 25, 0.85);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- Animasi Bintang Berkelip --- */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- UI Components --- */
        .container {
            background: var(--container-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            width: 90%;
            max-width: 450px;
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        h1, h2, h3, #timer {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 { font-size: 1.5rem; color: var(--primary-color); margin-bottom: 20px; }

        .hidden { display: none !important; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            color: white;
            font-size: 20px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            outline: none;
        }

        button {
            padding: 15px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: bold;
            color: var(--bg-color);
            background-color: var(--primary-color);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
            margin-top: 10px;
            box-shadow: none;
        }

        #timer {
            font-size: 70px;
            margin: 30px 0;
            color: white;
            text-shadow: 0 0 20px var(--primary-color);
        }

        .error { color: #ff4d4d; font-size: 14px; margin-bottom: 10px; display: none; }

        .creator-info {
            margin-top: 25px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Orbitron', sans-serif;
            line-height: 1.5;
        }

        #loading { margin-top: 15px; color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <!-- PAGE 1: LOGIN -->
    <div id="page1" class="container">
        <h1>Pen Push-Up<br>Therapy</h1>
        <p>Sila masukkan ID anda</p>
        <input type="text" id="participantId" placeholder="P001" maxlength="4">
        <p id="errorMsg" class="error">ID TIDAK SAH (P001-P099 SAHAJA)</p>
        <button onclick="login()">START THERAPY</button>
        <button onclick="setGCalReminder()" style="margin-top:10px; background-color:transparent; border:2px solid #ffd700; color:#ffd700; box-shadow:0 0 15px rgba(255,215,0,0.3);">
            📅 SET 8PM DAILY REMINDER (6 WEEKS)
        </button>
        
        <div class="creator-info">
            Created by: Muhammad Syafiq Hakimi bin Osman<br>
            Version : V1.4
        </div>
    </div>

    <!-- PAGE 2: TIMER -->
    <div id="page2" class="container hidden">
        <h3 id="welcomeText">ID: -</h3>
        <p style="color: var(--primary-color); font-family: 'Orbitron';">SESI <span id="sessionCount">1</span> / 3</p>
        
        <div id="timer">05:00</div>

        <button id="startBtn" onclick="startTimer()">MULA UJIAN</button>
        
        <div id="postSessionBtns" class="hidden">
            <p>Sesi tamat! Sedia untuk sesi seterusnya?</p>
            <button onclick="nextSession()">TERUSKAN SESI</button>
            <button class="btn-secondary" onclick="saveAndExit()">SIMPAN & KELUAR</button>
        </div>
        
        <div id="loading" class="hidden">MENYIMPAN DATA...</div>
    </div>

    <script>
        // --- AUDIO GENERATOR (Futuristic UI Sound) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSciFiSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'square'; 
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', playSciFiSound);
        });

        // --- CONFIGURATION ---
        const SESSION_DURATION = 5 * 60; // 5 Minit
        const MAX_SESSIONS = 3;
        const scriptURL = "https://script.google.com/macros/s/AKfycbxsyq0S0nz_OYHcbkqB6bgDnhKbe8BclIWkafvSd3sgi28a16_x2xiFi061m8-hNYY_wg/exec";

        let currentTimer;
        let timeLeft = SESSION_DURATION;
        let sessionNo = 1;

        // --- BACKGROUND GENERATOR (STARS) ---
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }
        createStars();

        // --- LOGIK APP ---
        window.onload = () => {
            // Sentiasa paparkan Page 1 bila di-refresh
            document.getElementById("page1").classList.remove("hidden");
            document.getElementById("page2").classList.add("hidden");

            // Auto-isi ID jika pernah login
            const savedId = localStorage.getItem("participantId");
            if (savedId) {
                document.getElementById("participantId").value = savedId;
            }
        };

        function login() {
            const idInput = document.getElementById("participantId").value.toUpperCase();
            const errorMsg = document.getElementById("errorMsg");
            const regex = /^P0(?:0[1-9]|[1-9][0-9])$/;

            if (regex.test(idInput)) {
                const savedId = localStorage.getItem("participantId");
                const today = new Date().toDateString();
                const lastLoginDate = localStorage.getItem("lastLoginDate");

                // Cek jika ID sama DAN di hari yang sama, kita sambung progress
                if (savedId === idInput && lastLoginDate === today) {
                    const savedSession = localStorage.getItem("sessionNo");
                    const savedTime = localStorage.getItem("timeLeft");
                    
                    if (savedSession) sessionNo = parseInt(savedSession);
                    if (savedTime) timeLeft = parseInt(savedTime);
                } else {
                    // ID baru ATAU hari baru, reset semua progress ke default
                    localStorage.setItem("participantId", idInput);
                    localStorage.setItem("lastLoginDate", today);
                    sessionNo = 1;
                    timeLeft = SESSION_DURATION;
                    
                    localStorage.setItem("sessionNo", sessionNo);
                    localStorage.setItem("timeLeft", timeLeft);
                    localStorage.removeItem("startTime");
                }

                showPage2(idInput);
            } else {
                errorMsg.style.display = "block";
            }
        }

        function showPage2(id) {
            document.getElementById("page1").classList.add("hidden");
            document.getElementById("page2").classList.remove("hidden");
            
            document.getElementById("welcomeText").innerText = `ID: ${id}`;
            document.getElementById("sessionCount").innerText = sessionNo;
            updateTimerDisplay(timeLeft);

            const startBtn = document.getElementById("startBtn");
            startBtn.classList.remove("hidden");
            document.getElementById("postSessionBtns").classList.add("hidden");

            // Jika ada baki masa (peserta ter-refresh), tukar teks ke SAMBUNG
            if (timeLeft < SESSION_DURATION && timeLeft > 0) {
                startBtn.innerText = "SAMBUNG UJIAN";
            } else {
                startBtn.innerText = "MULA UJIAN";
            }
        }

        function startTimer() {
            document.getElementById("startBtn").classList.add("hidden");
            
            // Simpan Start Time jika belum ada untuk sesi ini (kalis-refresh)
            if (!localStorage.getItem("startTime")) {
                localStorage.setItem("startTime", new Date().toISOString());
            }
            
            currentTimer = setInterval(() => {
                timeLeft--;
                localStorage.setItem("timeLeft", timeLeft); // Simpan state setiap 1 saat
                updateTimerDisplay(timeLeft);
                
                if (timeLeft <= 0) {
                    clearInterval(currentTimer);
                    endSession();
                }
            }, 1000);
        }

        function updateTimerDisplay(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById("timer").innerText = `${m}:${s}`;
        }

        function endSession() {
            sendDataToBackend("Completed");

            if (sessionNo < MAX_SESSIONS) {
                document.getElementById("postSessionBtns").classList.remove("hidden");
            } else {
                saveAndExit();
            }
        }

        function nextSession() {
            sessionNo++;
            timeLeft = SESSION_DURATION;
            
            // Simpan state sesi baru ke Local Storage
            localStorage.setItem("sessionNo", sessionNo);
            localStorage.setItem("timeLeft", timeLeft);
            localStorage.removeItem("startTime"); 
            
            document.getElementById("sessionCount").innerText = sessionNo;
            document.getElementById("postSessionBtns").classList.add("hidden");
            updateTimerDisplay(timeLeft);
            
            const startBtn = document.getElementById("startBtn");
            startBtn.innerText = "MULA UJIAN";
            startBtn.classList.remove("hidden");
        }

        function saveAndExit() {
            document.getElementById("page2").innerHTML = "<h1>TERIMA KASIH</h1><p>Data anda telah berjaya disimpan.</p>";
            // Reset state supaya esok mula baru (Pilihan: Boleh dibuang kalau nak auto-reset esok hari)
            localStorage.removeItem("sessionNo");
            localStorage.removeItem("timeLeft");
            localStorage.removeItem("startTime");
        }

        function sendDataToBackend(status) {
            const loadingDiv = document.getElementById("loading");
            loadingDiv.classList.remove("hidden");
            loadingDiv.innerText = "MENYIMPAN DATA...";

            const pID = localStorage.getItem("participantId");
            const savedStartTimeStr = localStorage.getItem("startTime");
            
            // Guna masa start dari Local Storage supaya duration tepat walau di-refresh
            const startTimeObj = savedStartTimeStr ? new Date(savedStartTimeStr) : new Date();
            const endTimeObj = new Date();

            const pDate = startTimeObj.toLocaleDateString('en-GB'); 
            const startTime = startTimeObj.toLocaleTimeString('en-GB');
            const endTime = endTimeObj.toLocaleTimeString('en-GB');
            const duration = ((endTimeObj - startTimeObj) / 60000).toFixed(2);

            const payload = {
                pID: pID,
                pDate: pDate,
                startTime: startTime,
                endTime: endTime,
                duration: duration,
                sessionNumber: sessionNo,
                status: status
            };

            fetch(scriptURL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            }).then(() => {
                loadingDiv.innerText = "✓ DATA DISIMPAN";
                setTimeout(() => loadingDiv.classList.add("hidden"), 2000);
            }).catch(err => {
                loadingDiv.innerText = "✕ RALAT SERVER";
            });
        }
        function setGCalReminder() {
            const pad = n => String(n).padStart(2, '0');
            const now = new Date();
            const startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 20, 0, 0);
            const endEventDate = new Date(startDate.getTime() + 15 * 60 * 1000);
            const endRecur = new Date(startDate.getTime() + 6 * 7 * 24 * 60 * 60 * 1000);

            function fmtLocal(d) {
                return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
            }
            function fmtDate(d) {
                return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
            }

            const params = new URLSearchParams({
                action: 'TEMPLATE',
                text: '✏️ Pen Push-Up Therapy Session',
                details: 'Masa untuk sesi Pen Push-Up Therapy harian anda!\n\nLengkapkan 3 sesi × 5 minit setiap hari.',
                dates: `${fmtLocal(startDate)}/${fmtLocal(endEventDate)}`,
                recur: `RRULE:FREQ=DAILY;UNTIL=${fmtDate(endRecur)}T200000Z`,
            });

            window.open(`https://calendar.google.com/calendar/render?${params.toString()}`, '_blank');
        }
    </script>
</body>
</html>
